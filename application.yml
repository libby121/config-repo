eureka:
  client:
    service-url:
      defaultZone: http://eureka-server:8761/eureka

management:
  endpoint:
    health:
      probes:
        enabled: true 
    show-details: always
  endpoints:
    web:
      exposure:
        include: health,info
  health:
    group:
      readiness:
        include: db
      liveness:
        include: ping
  info:
    app:
      name: mes-service
 
 
