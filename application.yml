eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka

management:
  endpoint:
    health:
      probes:
        enabled: true 
    show-details: always
  endpoints:
    web:
      exposure:
        include: health,info
  health:
    group:
      readiness:
        include: db
      liveness:
        include: ping
